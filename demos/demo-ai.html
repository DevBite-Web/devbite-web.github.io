<!DOCTYPE HTML>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Демо: AI Асистент</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f23; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .chat-window { background: #1a1a2e; border-radius: 20px; width: 100%; max-width: 600px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: flex; flex-direction: column; height: 80vh; max-height: 600px; border: 1px solid rgba(124,58,237,0.3); }
    .chat-header { background: linear-gradient(135deg, #4c1d95, #7c3aed); padding: 18px 24px; display: flex; align-items: center; gap: 14px; }
    .ai-orb { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 0 0 rgba(168,85,247,0.4); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(168,85,247,0.4); } 50% { box-shadow: 0 0 0 10px rgba(168,85,247,0); } }
    .header-info h2 { color: white; font-size: 1.05em; font-weight: 700; }
    .header-info p { color: rgba(255,255,255,0.6); font-size: 0.8em; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #34d399; display: inline-block; margin-right: 5px; }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #3d2d6e; border-radius: 2px; }
    .msg-wrap { display: flex; gap: 10px; align-items: flex-start; }
    .msg-wrap.user { flex-direction: row-reverse; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .avatar.ai { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .avatar.user { background: linear-gradient(135deg, #374151, #6b7280); }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 0.88em; line-height: 1.6; }
    .bubble.ai { background: #2d2d4e; color: #e2e8f0; border-top-left-radius: 4px; }
    .bubble.user { background: linear-gradient(135deg, #5b21b6, #7c3aed); color: white; border-top-right-radius: 4px; }
    .bubble.typing { background: #2d2d4e; color: #6b7280; font-style: italic; }
    .bubble b { color: #a78bfa; }
    .suggestions { padding: 8px 20px; display: flex; flex-wrap: wrap; gap: 8px; }
    .sug-btn { background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); color: #a78bfa; border-radius: 20px; padding: 6px 14px; font-size: 0.78em; cursor: pointer; transition: all 0.15s; }
    .sug-btn:hover { background: rgba(124,58,237,0.3); color: white; }
    .input-bar { padding: 14px 20px; background: #16213e; display: flex; gap: 10px; border-top: 1px solid rgba(124,58,237,0.2); }
    .input-bar input { flex: 1; background: #2d2d4e; border: 1px solid rgba(124,58,237,0.3); border-radius: 12px; padding: 10px 16px; color: white; font-size: 0.9em; outline: none; transition: border-color 0.2s; }
    .input-bar input:focus { border-color: #7c3aed; }
    .input-bar input::placeholder { color: #4b5563; }
    .send-btn { background: linear-gradient(135deg, #7c3aed, #a855f7); border: none; border-radius: 12px; width: 44px; color: white; font-size: 1.1em; cursor: pointer; transition: opacity 0.2s; }
    .send-btn:hover { opacity: 0.85; }
    .notice { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); padding: 10px 16px; font-size: 0.78em; color: #fbbf24; text-align: center; }
    .back-link { text-align:center; padding: 10px; font-size:0.78em; }
    .back-link a { color: #7c3aed; }
  </style>
</head>
<body>
<div class="chat-window">
  <div class="chat-header">
    <div class="ai-orb">✦</div>
    <div class="header-info">
      <h2>AI Асистент</h2>
      <p><span class="status-dot"></span>Демо-режим активний</p>
    </div>
  </div>
  <div class="notice">⚠️ Реальна інтеграція ШІ потребує зовнішньої AI-моделі та оплати API.</div>
  <div class="messages" id="msgs"></div>
  <div class="suggestions" id="sugs"></div>
  <div class="input-bar">
    <input id="userInput" placeholder="Задайте питання AI..." onkeydown="if(event.key==='Enter')send()" />
    <button class="send-btn" onclick="send()">➤</button>
  </div>
  <div class="back-link"><a href="../index.html">← Повернутись на сайт</a></div>
</div>
<script>
var responses = {
  default: "Дякую за запит! У реальній інтеграції тут AI дав би точну відповідь на основі ваших даних.\n\nЦе <b>демо-режим</b> без підключення до AI-моделі.",
  привіт: "Привіт! 👋 Я AI-асистент DevBite. У повній версії я можу:\n\n• Відповідати на питання про ваш бізнес\n• Аналізувати дані та текст\n• Давати персоналізовані рекомендації\n• Спілкуватися з клієнтами 24/7",
  аналіз: "📊 <b>Аналіз завершено (демо)</b>\n\nУ реальній інтеграції AI проаналізує ваші дані та надасть:\n• Ключові метрики\n• Виявлені тенденції\n• Рекомендації щодо покращення",
  допомог: "У чому можу допомогти:\n\n✅ Відповіді на FAQ клієнтів\n✅ Аналіз відгуків\n✅ Генерація контенту\n✅ Класифікація запитів\n✅ Персоналізовані рекомендації",
  ціна: "Інтеграція AI на сайт:\n\n💡 Вартість залежить від:\n• Обраної AI-моделі\n• Кількості запитів на місяць\n• Складності інтеграції\n\nЗверніться для розрахунку: matthew.korenets@gmail.com",
};

var suggestions = ["👋 Привіт!", "📊 Аналіз даних", "❓ Що ти вмієш?", "💰 Скільки коштує?"];

function addMsg(text, type, delay) {
  setTimeout(function(){
    if(type==='typing'){
      var m=document.createElement('div'); m.className='msg-wrap';
      m.innerHTML='<div class="avatar ai">✦</div><div class="bubble typing">⌨️ AI думає...</div>';
      m.id='typing'; document.getElementById('msgs').appendChild(m); scroll(); return;
    }
    var t=document.getElementById('typing'); if(t) t.remove();
    var wrap=document.createElement('div'); wrap.className='msg-wrap '+(type==='user'?'user':'');
    var av=type==='user'?'👤':'✦';
    wrap.innerHTML='<div class="avatar '+type+'">'+av+'</div><div class="bubble '+type+'">'+text.replace(/\n/g,'<br>')+'</div>';
    document.getElementById('msgs').appendChild(wrap); scroll();
  }, delay||0);
}

function scroll(){ var m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight; }

function send(){
  var val=document.getElementById('userInput').value.trim(); if(!val) return;
  document.getElementById('userInput').value='';
  document.getElementById('sugs').innerHTML='';
  addMsg(val,'user');
  var lower=val.toLowerCase();
  var resp=responses.default;
  Object.keys(responses).forEach(function(k){ if(lower.includes(k)) resp=responses[k]; });
  addMsg('','typing',600); addMsg(resp,'ai',1600);
  setTimeout(function(){ renderSuggestions(); }, 1700);
}

function renderSuggestions(){
  var div=document.getElementById('sugs'); div.innerHTML='';
  suggestions.slice(0,3).forEach(function(s){
    var b=document.createElement('button'); b.className='sug-btn'; b.textContent=s;
    b.onclick=function(){ document.getElementById('userInput').value=s; send(); };
    div.appendChild(b);
  });
}

addMsg('Привіт! 👋 Я AI-асистент у демо-режимі.\n\nСпробуйте задати мені питання або оберіть одну з підказок нижче.','ai',600);
setTimeout(renderSuggestions, 700);
</script>
</body>
</html>
