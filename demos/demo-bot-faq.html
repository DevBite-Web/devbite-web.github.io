<!DOCTYPE HTML>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Демо: FAQ-бот</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f7ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .phone { background: #1f1f1f; border-radius: 40px; padding: 12px; width: 340px; box-shadow: 0 12px 48px rgba(0,0,0,0.3); }
    .screen { background: #0f0f23; border-radius: 30px; overflow: hidden; }
    .tg-header { background: #5b21b6; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .bot-info h3 { color: white; font-size: 0.9em; font-weight: 700; }
    .bot-info p { color: rgba(255,255,255,0.7); font-size: 0.75em; }
    .messages { padding: 12px; min-height: 360px; max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #1a1a2e; }
    .msg { max-width: 82%; padding: 9px 12px; border-radius: 16px; font-size: 0.82em; line-height: 1.5; }
    .msg.bot { background: #2d2d4e; color: #e2e8f0; border-bottom-left-radius: 4px; align-self: flex-start; }
    .msg.user { background: #5b21b6; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg.typing { background: #2d2d4e; color: #9ca3af; align-self: flex-start; font-style: italic; }
    .faq-list { padding: 10px 12px; background: #16213e; display: flex; flex-direction: column; gap: 6px; }
    .faq-btn { background: #2d2d4e; color: #e2e8f0; border: 1px solid #3d3d6e; border-radius: 10px; padding: 10px 14px; font-size: 0.8em; cursor: pointer; text-align: left; transition: all 0.15s; }
    .faq-btn:hover { background: #5b21b6; border-color: #7c3aed; }
    .tg-input { background: #16213e; padding: 10px 12px; display: flex; gap: 8px; align-items: center; }
    .tg-input input { flex: 1; background: #2d2d4e; border: none; border-radius: 20px; padding: 8px 14px; color: white; font-size: 0.82em; outline: none; }
    .tg-input input::placeholder { color: #6b7280; }
    .send-btn { background: #5b21b6; border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .notice { background: #fef3c7; border-left: 3px solid #f59e0b; padding: 10px 14px; font-size: 0.78em; color: #92400e; margin-top: 14px; border-radius: 0 8px 8px 0; max-width: 340px; }
    .note { text-align:center; font-size:0.78em; color:#9ca3af; margin-top:10px; }
    a { color: #7c3aed; }
  </style>
</head>
<body>
<div style="text-align:center;">
<div class="phone">
  <div class="screen">
    <div class="tg-header">
      <div class="bot-avatar">❓</div>
      <div class="bot-info">
        <h3>DevBite FAQ</h3>
        <p>відповідає автоматично</p>
      </div>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="faq-list" id="faqList"></div>
    <div class="tg-input">
      <input id="userInput" placeholder="Задайте питання..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
<div class="notice">⚠️ Реальна інтеграція ШІ потребує зовнішньої AI-моделі та оплати API.</div>
<p class="note"><a href="../index.html">Повернутись на сайт</a></p>
</div>
<script>
var faq = [
  { q: "💰 Скільки коштує?", a: "Вартість залежить від послуги:\n• Telegram-бот від 500 ₴\n• Форма заявок від 800 ₴\n• Повний калькулятор від 1000 ₴\n\nТочна ціна — після обговорення задачі." },
  { q: "⏱ Які терміни виконання?", a: "Стандартні терміни:\n• Прості інструменти: 3–5 днів\n• Середні проєкти: 7–10 днів\n• Складні: до 14 днів\n\nЄ опція прискореного виконання." },
  { q: "📦 Що входить у послугу?", a: "У базову вартість входить:\n✅ Розробка інструменту\n✅ Тестування\n✅ Здача готового файлу\n\nДодатково: підтримка, документація, доопрацювання." },
  { q: "📞 Як зв'язатись?", a: "Зв'язок зі мною:\n📧 matthew.korenets@gmail.com\n💬 Telegram: @fatboy_slimm\n📱 Телефон: +380 99 649 31 06" },
  { q: "🔧 Які технології?", a: "Працюю з:\n• HTML / CSS / JavaScript\n• Python (боти, скрипти)\n• Telegram Bot API\n• AI API (OpenAI, Claude та ін.)" },
];

function addMsg(text, type, delay) {
  setTimeout(function() {
    if(type==='typing'){ var m=document.createElement('div'); m.className='msg typing'; m.textContent='⌨️ друкує...'; document.getElementById('msgs').appendChild(m); scroll(); return; }
    document.querySelectorAll('.msg.typing').forEach(function(e){e.remove();});
    var m=document.createElement('div'); m.className='msg '+type; m.innerHTML=text.replace(/\n/g,'<br>');
    document.getElementById('msgs').appendChild(m); scroll();
  }, delay||0);
}

function scroll() { var msgs=document.getElementById('msgs'); msgs.scrollTop=msgs.scrollHeight; }

function renderFaq() {
  var list=document.getElementById('faqList'); list.innerHTML='';
  faq.forEach(function(item){
    var btn=document.createElement('button'); btn.className='faq-btn'; btn.textContent=item.q;
    btn.onclick=function(){ answerFaq(item); };
    list.appendChild(btn);
  });
}

function answerFaq(item) {
  addMsg(item.q, 'user');
  addMsg('','typing',400);
  addMsg(item.a, 'bot', 1200);
}

function sendMsg() {
  var val=document.getElementById('userInput').value.trim(); if(!val) return;
  addMsg(val,'user'); document.getElementById('userInput').value='';
  // Simple keyword matching
  var lower=val.toLowerCase();
  var answer=null;
  if(lower.includes('ціна')||lower.includes('кошт')||lower.includes('варт')) answer=faq[0].a;
  else if(lower.includes('терм')||lower.includes('час')||lower.includes('скільки дн')) answer=faq[1].a;
  else if(lower.includes('вход')||lower.includes('включ')) answer=faq[2].a;
  else if(lower.includes('контакт')||lower.includes('зв\'яз')||lower.includes('телефон')) answer=faq[3].a;
  else if(lower.includes('технолог')||lower.includes('мова')||lower.includes('python')) answer=faq[4].a;
  else answer='Не знайшов готової відповіді. Будь ласка, виберіть питання з меню нижче або зверніться безпосередньо:\n📧 matthew.korenets@gmail.com';
  addMsg('','typing',600); addMsg(answer,'bot',1500);
}

addMsg('Привіт! 👋 Я FAQ-бот DevBite.\n\nОберіть питання або напишіть своє:','bot',800);
setTimeout(renderFaq, 800);
</script>
</body>
</html>
