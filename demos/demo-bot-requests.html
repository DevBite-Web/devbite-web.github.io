<!DOCTYPE HTML>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Telegram-бот для заявок</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #6d28d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── Phone shell ── */
    .phone {
      width: 320px;
      background: #17212b;
      border-radius: 44px;
      padding: 12px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.07),
        0 32px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.10);
      position: relative;
    }

    /* Dynamic island */
    .phone::before {
      content: '';
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 26px;
      background: #000;
      border-radius: 14px;
      z-index: 10;
    }

    .screen {
      background: #17212b;
      border-radius: 34px;
      overflow: hidden;
      height: 620px;
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    .status-bar {
      background: #232e3c;
      padding: 52px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .status-time {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.2px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-icons svg {
      fill: #ffffff;
    }

    /* ── TG top bar ── */
    .tg-header {
      background: #232e3c;
      padding: 8px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .back-btn {
      color: #5eabf0;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      padding-right: 2px;
    }

    .bot-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5eabf0, #3d8bd4);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .bot-info {
      flex: 1;
      min-width: 0;
    }

    .bot-name {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bot-status {
      font-size: 12px;
      color: #5eabf0;
      margin-top: 1px;
    }

    .header-icons {
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .header-icons svg {
      fill: #5eabf0;
      width: 20px;
      height: 20px;
    }

    /* ── Chat background ── */
    .chat-bg {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px;
      background-color: #0e1621;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(94,171,240,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(94,171,240,0.03) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      gap: 3px;
      scroll-behavior: smooth;
    }

    .chat-bg::-webkit-scrollbar { width: 0; }

    /* ── Date separator ── */
    .date-sep {
      text-align: center;
      margin: 6px 0 10px;
    }

    .date-sep span {
      background: rgba(14,22,33,0.7);
      color: #8a9aaa;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    /* ── Messages ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      margin-bottom: 2px;
    }

    .msg-row.bot { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }

    .msg-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5eabf0, #3d8bd4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .msg-avatar.hidden { visibility: hidden; }

    .bubble {
      max-width: 76%;
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.45;
      position: relative;
      word-break: break-word;
    }

    /* Bot bubble */
    .msg-row.bot .bubble {
      background: #232e3c;
      color: #e8eaed;
      border-bottom-left-radius: 4px;
    }

    /* User bubble */
    .msg-row.user .bubble {
      background: #2b5278;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      float: right;
      margin-left: 8px;
      margin-top: 3px;
      white-space: nowrap;
    }

    .msg-row.user .msg-time {
      color: rgba(255,255,255,0.55);
    }

    /* Read ticks */
    .ticks {
      display: inline-flex;
      align-items: center;
      margin-left: 3px;
      vertical-align: middle;
    }

    .ticks svg {
      width: 14px;
      height: 10px;
    }

    /* Keyboard buttons inside bubble */
    .kb-buttons {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .kb-btn {
      background: rgba(94,171,240,0.14);
      border: 1px solid rgba(94,171,240,0.22);
      border-radius: 10px;
      color: #5eabf0;
      font-size: 12.5px;
      font-weight: 500;
      padding: 7px 10px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      width: 100%;
    }

    .kb-btn:hover { background: rgba(94,171,240,0.24); }

    /* Typing indicator */
    .typing {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0 6px;
    }

    .typing .msg-avatar { }

    .typing-dots {
      background: #232e3c;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #5eabf0;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      background: #232e3c;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .attach-btn {
      color: #8a9aaa;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }

    .input-field {
      flex: 1;
      background: #17212b;
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      color: #ffffff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      min-height: 36px;
      resize: none;
      line-height: 1.4;
    }

    .input-field::placeholder { color: #5a6a7a; }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2b5278;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #3a6898; }

    .send-btn svg {
      fill: #5eabf0;
      width: 18px;
      height: 18px;
    }

    .mic-btn {
      color: #8a9aaa;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Bottom home indicator ── */
    .home-indicator {
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #17212b;
    }

    .home-bar {
      width: 120px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
    }

    /* ── Back link ── */
    .back-link {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      text-align: center;
    }

    .back-link:hover { color: rgba(255,255,255,0.8); }
  </style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <!-- Status bar -->
    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <!-- Signal -->
        <svg width="16" height="12" viewBox="0 0 16 12">
          <rect x="0" y="8" width="3" height="4" rx="0.5" opacity="1"/>
          <rect x="4.5" y="5" width="3" height="7" rx="0.5" opacity="1"/>
          <rect x="9" y="2" width="3" height="10" rx="0.5" opacity="1"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="0.5" opacity="0.3"/>
        </svg>
        <!-- WiFi -->
        <svg width="15" height="12" viewBox="0 0 15 12">
          <path d="M7.5 9.5 a1.5 1.5 0 1 1 0 0.01" fill="white"/>
          <path d="M4.5 7 Q7.5 4.5 10.5 7" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.85"/>
          <path d="M2 4.5 Q7.5 0.5 13 4.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.55"/>
        </svg>
        <!-- Battery -->
        <svg width="24" height="12" viewBox="0 0 24 12">
          <rect x="0" y="1" width="20" height="10" rx="2" stroke="white" stroke-width="1" fill="none" opacity="0.35"/>
          <rect x="1.5" y="2.5" width="16" height="7" rx="1.2" fill="white"/>
          <path d="M21 4.5 v3 Q23 6 21 4.5" fill="white" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- TG header -->
    <div class="tg-header">
      <div class="back-btn">‹</div>
      <div class="bot-avatar">З</div>
      <div class="bot-info">
        <div class="bot-name">ЗаявкиБот</div>
        <div class="bot-status">онлайн</div>
      </div>
      <div class="header-icons">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 0h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 7.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="#5eabf0" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
      </div>
    </div>

    <!-- Chat -->
    <div class="chat-bg" id="chat">
      <div class="date-sep"><span>Сьогодні</span></div>
    </div>

    <!-- Input bar -->
    <div class="input-bar">
      <span class="attach-btn">📎</span>
      <input class="input-field" id="userInput" placeholder="Повідомлення" onkeydown="handleKey(event)"/>
      <button class="send-btn" onclick="sendUserMsg()" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="#5eabf0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

  </div>
  <div class="home-indicator"><div class="home-bar"></div></div>
</div>

<a class="back-link" href="../index.html">← Повернутись на сайт</a>

<script>
  var chat = document.getElementById('chat');
  var input = document.getElementById('userInput');

  /* ── Conversation flow ── */
  var step = 0;
  var answers = {};

  var flow = [
    {
      bot: 'Привіт! Я допомагаю оформити заявку. Як вас звати?',
      buttons: null,
      key: 'name'   // user answers with their name at this step
    },
    {
      key: 'service',
      buttons: ['Консультація', 'Розробка сайту', 'Telegram-бот', 'Інше'],
      botTemplate: function(a) { return 'Приємно, ' + a + '! Що вас цікавить?'; }
    },
    {
      key: 'budget',
      buttons: ['До 5 000 ₴', '5 000 – 15 000 ₴', 'Понад 15 000 ₴', 'Поки не визначився'],
      botTemplate: function(a) { return 'Добре. Який приблизний бюджет?'; }
    },
    {
      key: 'contact',
      buttons: null,
      botTemplate: function(a) { return 'Чудово! Залиште номер або @username у Telegram, щоб ми могли зв\'язатись.'; }
    },
    {
      key: null,
      buttons: null,
      botTemplate: function(a) {
        return 'Заявку отримано!\n\n' +
          'Ім\'я: ' + answers.name + '\n' +
          'Послуга: ' + answers.service + '\n' +
          'Бюджет: ' + answers.budget + '\n' +
          'Контакт: ' + answers.contact + '\n\n' +
          'Ми зв\'яжемось з вами найближчим часом.';
      },
      final: true
    }
  ];

  /* ── Helpers ── */
  function scrollDown() {
    setTimeout(function() { chat.scrollTop = chat.scrollHeight; }, 50);
  }

  function now() {
    var d = new Date();
    return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function addBotMsg(text, buttons) {
    var row = document.createElement('div');
    row.className = 'msg-row bot';

    var av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'З';

    var bub = document.createElement('div');
    bub.className = 'bubble';

    // Handle newlines
    var lines = text.split('\n');
    lines.forEach(function(line, i) {
      if (i > 0) bub.appendChild(document.createElement('br'));
      bub.appendChild(document.createTextNode(line));
    });

    var timeEl = document.createElement('span');
    timeEl.className = 'msg-time';
    timeEl.textContent = now();
    bub.appendChild(timeEl);

    if (buttons) {
      var kb = document.createElement('div');
      kb.className = 'kb-buttons';
      buttons.forEach(function(label) {
        var btn = document.createElement('button');
        btn.className = 'kb-btn';
        btn.textContent = label;
        btn.onclick = function() {
          removeButtons();
          addUserMsg(label);
          handleAnswer(label);
        };
        kb.appendChild(btn);
      });
      bub.appendChild(kb);
    }

    row.appendChild(av);
    row.appendChild(bub);
    chat.appendChild(row);
    scrollDown();
  }

  function addUserMsg(text) {
    var row = document.createElement('div');
    row.className = 'msg-row user';

    var bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = text;

    var timeEl = document.createElement('span');
    timeEl.className = 'msg-time';
    timeEl.innerHTML = now() + ' <span class="ticks"><svg viewBox="0 0 16 10" fill="none"><path d="M1 5l4 4L15 1" stroke="#5eabf0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 5l4 4" stroke="#5eabf0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>';
    bub.appendChild(timeEl);

    row.appendChild(bub);
    chat.appendChild(row);
    scrollDown();
  }

  function addTyping() {
    var row = document.createElement('div');
    row.className = 'typing';
    row.id = 'typing';

    var av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'З';

    var dots = document.createElement('div');
    dots.className = 'typing-dots';
    for (var i = 0; i < 3; i++) {
      var d = document.createElement('div');
      d.className = 'dot';
      dots.appendChild(d);
    }

    row.appendChild(av);
    row.appendChild(dots);
    chat.appendChild(row);
    scrollDown();
  }

  function removeTyping() {
    var t = document.getElementById('typing');
    if (t) t.remove();
  }

  function removeButtons() {
    chat.querySelectorAll('.kb-btn').forEach(function(b) {
      b.disabled = true;
      b.style.opacity = '0.45';
      b.style.cursor = 'default';
    });
  }

  /* ── Flow logic ── */
  function handleAnswer(text) {
    var current = flow[step];

    // Save answer for this step
    if (current.key) answers[current.key] = text;

    step++;
    if (step >= flow.length) return;

    var next = flow[step];
    var botText = next.botTemplate ? next.botTemplate(text) : next.bot;

    addTyping();
    setTimeout(function() {
      removeTyping();
      addBotMsg(botText, next.buttons || null);
      if (next.final) {
        input.disabled = true;
        input.placeholder = 'Заявку надіслано';
        document.getElementById('sendBtn').style.opacity = '0.3';
        document.getElementById('sendBtn').style.pointerEvents = 'none';
      }
    }, 900);
  }

  function validateContact(text) {
    var phone = /^[\+\d][\d\s\-\(\)]{6,}$/.test(text.trim());
    var tg    = /^@[a-zA-Z][a-zA-Z0-9_]{3,}$/.test(text.trim());
    return phone || tg;
  }

  function sendUserMsg() {
    var text = input.value.trim();
    if (!text || input.disabled) return;

    // Contact validation
    if (flow[step] && flow[step].key === 'contact') {
      if (!validateContact(text)) {
        showInputError('Введіть номер телефону або @username у Telegram');
        return;
      }
    }

    clearInputError();
    input.value = '';
    addUserMsg(text);
    handleAnswer(text);
  }

  function showInputError(msg) {
    var existing = document.getElementById('inputError');
    if (existing) return;
    var err = document.createElement('div');
    err.id = 'inputError';
    err.style.cssText = 'font-size:11.5px;color:#e57373;padding:4px 14px 0;text-align:center;';
    err.textContent = msg;
    input.parentNode.parentNode.insertBefore(err, input.parentNode);
    input.style.borderColor = '#e57373';
    setTimeout(function() { clearInputError(); }, 3000);
  }

  function clearInputError() {
    var err = document.getElementById('inputError');
    if (err) err.remove();
    input.style.borderColor = '';
  }

  function handleKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); sendUserMsg(); }
  }

  /* ── Init ── */
  setTimeout(function() {
    addTyping();
    setTimeout(function() {
      removeTyping();
      addBotMsg(flow[0].bot, null);
      // step stays 0 — user's first reply is the answer to flow[0]
      input.disabled = false;
    }, 800);
  }, 300);

  input.disabled = true;
</script>

</body>
</html>
