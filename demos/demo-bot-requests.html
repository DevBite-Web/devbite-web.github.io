<!DOCTYPE HTML>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Демо: Telegram-бот для заявок</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f7ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .phone { background: #1f1f1f; border-radius: 40px; padding: 12px; width: 340px; box-shadow: 0 12px 48px rgba(0,0,0,0.3); }
    .screen { background: #0f0f23; border-radius: 30px; overflow: hidden; }
    .tg-header { background: #7c3aed; padding: 12px 16px; display: flex; align-items: center; gap: 10px; }
    .bot-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .bot-info h3 { color: white; font-size: 0.9em; font-weight: 700; }
    .bot-info p { color: rgba(255,255,255,0.7); font-size: 0.75em; }
    .messages { padding: 12px; min-height: 400px; max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: #1a1a2e; }
    .msg { max-width: 80%; padding: 9px 12px; border-radius: 16px; font-size: 0.82em; line-height: 1.5; }
    .msg.bot { background: #2d2d4e; color: #e2e8f0; border-bottom-left-radius: 4px; align-self: flex-start; }
    .msg.user { background: #7c3aed; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg.typing { background: #2d2d4e; color: #9ca3af; align-self: flex-start; font-style: italic; }
    .kbd-buttons { padding: 8px 12px; background: #16213e; display: flex; flex-wrap: wrap; gap: 6px; }
    .kbd-btn { background: #2d2d4e; color: #e2e8f0; border: none; border-radius: 8px; padding: 8px 10px; font-size: 0.78em; cursor: pointer; transition: background 0.15s; text-align: center; }
    .kbd-btn:hover { background: #7c3aed; color: white; }
    .tg-input { background: #16213e; padding: 10px 12px; display: flex; gap: 8px; align-items: center; }
    .tg-input input { flex: 1; background: #2d2d4e; border: none; border-radius: 20px; padding: 8px 14px; color: white; font-size: 0.82em; outline: none; }
    .tg-input input::placeholder { color: #6b7280; }
    .send-btn { background: #7c3aed; border: none; width: 32px; height: 32px; border-radius: 50%; color: white; cursor: pointer; font-size: 1em; display: flex; align-items: center; justify-content: center; }
    .note { text-align:center; font-size:0.78em; color:#9ca3af; margin-top:14px; }
    a { color: #7c3aed; }
  </style>
</head>
<body>
<div style="text-align:center;">
<div class="phone">
  <div class="screen">
    <div class="tg-header">
      <div class="bot-avatar">🤖</div>
      <div class="bot-info">
        <h3>DevBite Заявки</h3>
        <p id="status">онлайн</p>
      </div>
    </div>
    <div class="messages" id="msgs"></div>
    <div class="kbd-buttons" id="kbd"></div>
    <div class="tg-input">
      <input id="userInput" placeholder="Введіть повідомлення..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>
<p class="note"><a href="../index.html">Повернутись на сайт</a></p>
</div>
<script>
var step = 0;
var userData = {};
var flow = [
  { bot: "Вітаю! 👋 Я бот для прийому заявок DevBite.\n\nОберіть що вас цікавить:", btns: ["📱 Telegram-бот","🗓 Календар","📊 Калькулятор","🤖 Інше"] },
  { bot: "Чудово! Вкажіть деталі задачі:", btns: [] },
  { bot: "Зрозумів. Тепер вкажіть ваш контакт (Telegram або email):", btns: [] },
  { bot: null }
];

function addMsg(text, type, delay) {
  setTimeout(function() {
    if(type === 'typing') {
      var old = document.querySelector('.msg.typing');
      if(!old) { var m = document.createElement('div'); m.className = 'msg typing'; m.textContent = '⌨️ друкує...'; document.getElementById('msgs').appendChild(m); scroll(); }
      return;
    }
    var old = document.querySelector('.msg.typing');
    if(old) old.remove();
    var m = document.createElement('div');
    m.className = 'msg ' + type;
    m.innerHTML = text.replace(/\n/g, '<br>');
    document.getElementById('msgs').appendChild(m);
    scroll();
  }, delay || 0);
}

function setKbd(btns) {
  var kbd = document.getElementById('kbd');
  kbd.innerHTML = '';
  btns.forEach(function(b) {
    var btn = document.createElement('button');
    btn.className = 'kbd-btn';
    btn.textContent = b;
    btn.onclick = function() { handleInput(b); };
    kbd.appendChild(btn);
  });
}

function scroll() {
  var msgs = document.getElementById('msgs');
  msgs.scrollTop = msgs.scrollHeight;
}

function handleInput(text) {
  addMsg(text, 'user');
  document.getElementById('userInput').value = '';
  setKbd([]);

  if(step === 0) {
    userData.service = text;
    step = 1;
    addMsg('', 'typing', 500);
    addMsg(flow[1].bot, 'bot', 1200);
    setTimeout(function(){ setKbd([]); }, 1200);
  } else if(step === 1) {
    userData.details = text;
    step = 2;
    addMsg('', 'typing', 500);
    addMsg(flow[2].bot, 'bot', 1200);
  } else if(step === 2) {
    userData.contact = text;
    step = 3;
    addMsg('', 'typing', 600);
    setTimeout(function(){
      addMsg('✅ Дякую! Ваша заявка прийнята.\n\n<b>Резюме:</b>\n🔧 Послуга: ' + userData.service + '\n📝 Деталі: ' + userData.details + '\n📬 Контакт: ' + userData.contact + '\n\nМи зв\'яжемося з вами найближчим часом!', 'bot', 1400);
      setTimeout(function(){ setKbd(['🔄 Нова заявка']); }, 1400);
    }, 600);
  } else if(text === '🔄 Нова заявка') {
    step = 0; userData = {};
    document.getElementById('msgs').innerHTML = '';
    init();
  }
}

function sendMsg() {
  var val = document.getElementById('userInput').value.trim();
  if(val) handleInput(val);
}

function init() {
  addMsg('', 'typing', 300);
  addMsg(flow[0].bot, 'bot', 1000);
  setTimeout(function(){ setKbd(flow[0].btns); }, 1000);
}
init();
</script>
</body>
</html>
