<!DOCTYPE HTML>
<html lang="uk">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Демо: Калькулятор вартості послуг</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8f7ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 16px; box-shadow: 0 4px 32px rgba(124,58,237,0.12); width: 100%; max-width: 480px; overflow: hidden; }
    .card-header { background: linear-gradient(135deg, #7c3aed, #a855f7); color: white; padding: 24px 28px; }
    .card-header h1 { font-size: 1.3em; font-weight: 700; margin-bottom: 4px; }
    .card-header p { opacity: 0.8; font-size: 0.9em; }
    .card-body { padding: 28px; }
    label { display: block; font-size: 0.88em; color: #6b7280; margin-bottom: 6px; margin-top: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    label:first-child { margin-top: 0; }
    select, input[type=number] { width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 1em; color: #1f2937; background: #fafafa; transition: border-color 0.2s; outline: none; }
    select:focus, input:focus { border-color: #7c3aed; background: white; }
    .range-row { display: flex; align-items: center; gap: 12px; }
    .range-row input[type=range] { flex: 1; accent-color: #7c3aed; }
    .range-val { font-weight: 700; color: #7c3aed; min-width: 32px; text-align: right; }
    .checkboxes { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .checkbox-item { display: flex; align-items: center; gap: 6px; background: #f3f0ff; border-radius: 8px; padding: 8px 12px; cursor: pointer; transition: background 0.15s; }
    .checkbox-item:hover { background: #ede9fe; }
    .checkbox-item input { accent-color: #7c3aed; width: 16px; height: 16px; }
    .checkbox-item span { font-size: 0.9em; color: #374151; }
    .result-block { background: linear-gradient(135deg, #f3f0ff, #ede9fe); border-radius: 12px; padding: 20px; margin-top: 24px; text-align: center; }
    .result-label { font-size: 0.85em; color: #6b7280; margin-bottom: 4px; }
    .result-price { font-size: 2.5em; font-weight: 800; color: #7c3aed; }
    .result-breakdown { font-size: 0.82em; color: #9ca3af; margin-top: 6px; }
    .btn { display: block; width: 100%; margin-top: 20px; padding: 14px; background: #7c3aed; color: white; border: none; border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn:hover { background: #6d28d9; }
    .demo-note { text-align: center; font-size: 0.78em; color: #9ca3af; margin-top: 12px; }
    a { color: #7c3aed; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <h1>🧮 Калькулятор вартості</h1>
    <p>Підберіть параметри та дізнайтеся вартість</p>
  </div>
  <div class="card-body">
    <label>Тип послуги</label>
    <select id="service" onchange="calc()">
      <option value="500">Telegram-бот (базовий) — від 500 ₴</option>
      <option value="1200">Telegram FAQ-бот — від 1200 ₴</option>
      <option value="800">Форма заявок — від 800 ₴</option>
      <option value="1000">Калькулятор на сайт — від 1000 ₴</option>
      <option value="1500">Прайс-лист інтерактивний — від 1500 ₴</option>
      <option value="900">Календар бронювання — від 900 ₴</option>
      <option value="700">Чат-віджет — від 700 ₴</option>
    </select>

    <label>Складність (1 — просто, 5 — складно)</label>
    <div class="range-row">
      <input type="range" id="complexity" min="1" max="5" value="2" oninput="this.nextElementSibling.textContent=this.value;calc()">
      <span class="range-val" id="cv">2</span>
    </div>

    <label>Терміни</label>
    <select id="urgency" onchange="calc()">
      <option value="1">Стандартні (7–14 днів)</option>
      <option value="1.3">Прискорені (3–5 днів) +30%</option>
      <option value="1.6">Терміново (1–2 дні) +60%</option>
    </select>

    <label>Додаткові опції</label>
    <div class="checkboxes">
      <label class="checkbox-item"><input type="checkbox" id="support" onchange="calc()"><span>Місяць підтримки +200 ₴</span></label>
      <label class="checkbox-item"><input type="checkbox" id="design" onchange="calc()"><span>Кастомний дизайн +300 ₴</span></label>
      <label class="checkbox-item"><input type="checkbox" id="docs" onchange="calc()"><span>Документація +150 ₴</span></label>
    </div>

    <div class="result-block">
      <div class="result-label">Орієнтовна вартість</div>
      <div class="result-price" id="price">0 ₴</div>
      <div class="result-breakdown" id="breakdown"></div>
    </div>
    <button class="btn" onclick="order()">📩 Замовити цей проєкт</button>
    <p class="demo-note">Це демо-версія. <a href="../index.html">Повернутись на сайт</a></p>
  </div>
</div>
<script>
function calc() {
  var base = +document.getElementById('service').value;
  var comp = +document.getElementById('complexity').value;
  var urg = +document.getElementById('urgency').value;
  var support = document.getElementById('support').checked ? 200 : 0;
  var design = document.getElementById('design').checked ? 300 : 0;
  var docs = document.getElementById('docs').checked ? 150 : 0;
  var total = Math.round((base * (1 + (comp-1)*0.15) * urg) + support + design + docs);
  document.getElementById('price').textContent = total.toLocaleString('uk') + ' ₴';
  var extras = [];
  if(support) extras.push('підтримка +200₴');
  if(design) extras.push('дизайн +300₴');
  if(docs) extras.push('документація +150₴');
  document.getElementById('breakdown').textContent = extras.length ? extras.join(' · ') : 'Базова комплектація';
}
function order() {
  var service = document.getElementById('service').options[document.getElementById('service').selectedIndex].text;
  var price = document.getElementById('price').textContent;
  window.location.href = 'mailto:matthew.korenets@gmail.com?subject=' + encodeURIComponent('Замовлення: ' + service) + '&body=' + encodeURIComponent('Добрий день!\n\nХочу замовити: ' + service + '\nОрієнтовна вартість: ' + price + '\n\nДеталі: ');
}
calc();
</script>
</body>
</html>
