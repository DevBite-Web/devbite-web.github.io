<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f7ff"/>
  <!-- Browser frame -->
  <rect x="80" y="20" width="640" height="460" rx="12" fill="white" stroke="#e8e0f5" stroke-width="1.5"/>
  <rect x="80" y="20" width="640" height="36" rx="12" fill="#f3f4f6"/>
  <rect x="80" y="40" width="640" height="16" fill="#f3f4f6"/>
  <circle cx="104" cy="38" r="6" fill="#f87171"/>
  <circle cx="124" cy="38" r="6" fill="#fbbf24"/>
  <circle cx="144" cy="38" r="6" fill="#34d399"/>
  <rect x="180" y="28" width="380" height="20" rx="10" fill="white" stroke="#e5e7eb"/>
  <text x="370" y="43" font-family="Arial" font-size="11" fill="#9ca3af" text-anchor="middle">devbite.com</text>
  <!-- Page content -->
  <text x="200" y="90" font-family="Arial" font-size="18" fill="#1f2937" font-weight="bold">Ваш продукт</text>
  <rect x="180" y="100" width="280" height="12" rx="4" fill="#f3f4f6"/>
  <rect x="180" y="120" width="220" height="12" rx="4" fill="#f3f4f6"/>
  <!-- Chat widget -->
  <rect x="500" y="80" width="190" height="340" rx="16" fill="white" stroke="#d8b4fe" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="500" y="80" width="190" height="54" rx="16" fill="#7c3aed"/>
  <rect x="500" y="112" width="190" height="22" fill="#7c3aed"/>
  <circle cx="524" cy="107" r="16" fill="rgba(255,255,255,0.2)"/>
  <text x="524" y="113" font-family="Arial" font-size="13" fill="white" text-anchor="middle">💬</text>
  <text x="555" y="103" font-family="Arial" font-size="12" fill="white" font-weight="bold">Підтримка</text>
  <text x="555" y="118" font-family="Arial" font-size="10" fill="rgba(255,255,255,0.8)">онлайн</text>
  <!-- Chat messages -->
  <rect x="512" y="148" width="150" height="36" rx="10" fill="#f3f0ff"/>
  <text x="520" y="163" font-family="Arial" font-size="11" fill="#374151">Привіт! Маєте</text>
  <text x="520" y="178" font-family="Arial" font-size="11" fill="#374151">питання? 😊</text>
  <rect x="522" y="196" width="155" height="30" rx="10" fill="#7c3aed"/>
  <text x="532" y="216" font-family="Arial" font-size="11" fill="white">Так, є запитання!</text>
  <rect x="512" y="238" width="160" height="44" rx="10" fill="#f9f5ff"/>
  <text x="520" y="254" font-family="Arial" font-size="11" fill="#374151">Залюбки допоможу!</text>
  <text x="520" y="270" font-family="Arial" font-size="11" fill="#7c3aed">Напишіть детальніше.</text>
  <!-- Input -->
  <rect x="510" y="380" width="170" height="30" rx="15" fill="#f3f4f6"/>
  <text x="522" y="400" font-family="Arial" font-size="10" fill="#9ca3af">Введіть текст...</text>
  <circle cx="670" cy="395" r="12" fill="#7c3aed"/>
  <text x="670" y="400" font-family="Arial" font-size="12" fill="white" text-anchor="middle">➤</text>
  <!-- Chat FAB -->
  <circle cx="660" cy="440" r="30" fill="#7c3aed"/>
  <text x="660" y="448" font-family="Arial" font-size="22" fill="white" text-anchor="middle">💬</text>
</svg>
