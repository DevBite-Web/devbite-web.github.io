<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <filter id="card-shadow" x="-15%" y="-8%" width="130%" height="125%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="rgba(0,0,0,0.30)"/>
    </filter>
    <filter id="thumb-shadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(124,58,237,0.45)"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="230" y="20" width="340" height="462" rx="18"/>
    </clipPath>
  </defs>

  <rect width="800" height="500" fill="#6d28d9"/>
  <rect x="230" y="20" width="340" height="462" rx="18" fill="#ffffff" filter="url(#card-shadow)"/>

  <!-- Header -->
  <rect x="230" y="20" width="340" height="90" rx="18" fill="#7c3aed" clip-path="url(#card-clip)"/>
  <rect x="230" y="64" width="340" height="46" fill="#7c3aed"/>
  <text x="258" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="15.5" font-weight="800" fill="#ffffff">Розрахунок вартості зйомки</text>
  <text x="258" y="80" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Оберіть параметри — ціна розрахується автоматично</text>

  <!-- Тип зйомки -->
  <text x="258" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="700" fill="#9ca3af" letter-spacing="1.2">ТИП ЗЙОМКИ</text>
  <rect x="258" y="129" width="284" height="36" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="272" y="152" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#1f2937">Портретна зйомка</text>
  <polyline points="528,139 534,145 540,139" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Тривалість -->
  <text x="258" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="700" fill="#9ca3af" letter-spacing="1.2">ТРИВАЛІСТЬ —</text>
  <text x="360" y="188" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="700" fill="#7c3aed">2 ГОДИНИ</text>
  <rect x="258" y="199" width="284" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="258" y="199" width="40.6" height="4" rx="2" fill="#7c3aed"/>
  <circle cx="298.6" cy="201" r="10" fill="#7c3aed" filter="url(#thumb-shadow)"/>
  <text x="258" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">1 год</text>
  <text x="298.6" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="700" fill="#7c3aed" text-anchor="middle">2</text>
  <text x="339.1" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">3</text>
  <text x="379.7" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">4</text>
  <text x="420.3" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">5</text>
  <text x="460.9" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">6</text>
  <text x="501.4" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">7</text>
  <text x="542" y="221" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">8 год</text>

  <!-- Локація -->
  <text x="258" y="254" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="700" fill="#9ca3af" letter-spacing="1.2">ЛОКАЦІЯ</text>
  <rect x="258" y="262" width="136" height="48" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="326" y="284" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#7c3aed" text-anchor="middle">Студія</text>
  <text x="326" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">включено</text>
  <rect x="406" y="262" width="136" height="48" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="474" y="284" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" font-weight="600" fill="#1f2937" text-anchor="middle">Виїзд</text>
  <text x="474" y="300" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#9ca3af" text-anchor="middle">+600 грн</text>

  <line x1="258" y1="330" x2="542" y2="330" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Result -->
  <rect x="258" y="340" width="284" height="76" rx="12" fill="#7c3aed"/>
  <text x="274" y="362" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="1.2">ДО СПЛАТИ</text>
  <text x="274" y="380" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" fill="rgba(255,255,255,0.65)">Портретна, 2 год, студія</text>
  <text x="534" y="403" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" fill="#ffffff" text-anchor="end"><tspan font-size="17" font-weight="700" fill="rgba(255,255,255,0.60)" baseline-shift="4">₴ </tspan><tspan font-size="33" letter-spacing="-0.5">1 600</tspan></text>

  <!-- Button -->
  <rect x="258" y="430" width="284" height="44" rx="9" fill="#1f2937"/>
  <text x="400" y="457" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Замовити</text>
</svg>
