<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <!-- Background -->
  <rect width="900" height="560" fill="#6d28d9"/>

  <!-- Card -->
  <rect x="270" y="32" width="360" height="496" rx="18" fill="#ffffff" filter="url(#sh)"/>
  <defs>
    <filter id="sh" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="28" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>

  <!-- Card header -->
  <rect x="270" y="32" width="360" height="66" rx="18" fill="#7c3aed"/>
  <rect x="270" y="72" width="360" height="26" fill="#7c3aed"/>
  <text x="298" y="71" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="800" fill="#ffffff">Розрахунок вартості зйомки</text>

  <!-- Field 1: select -->
  <text x="298" y="120" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#9ca3af" letter-spacing="1">ТИП ЗЙОМКИ</text>
  <rect x="298" y="128" width="304" height="38" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="312" y="152" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="#1f2937">Портретна зйомка</text>
  <path d="M582 144 l5 6 5-6" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Field 2: range -->
  <text x="298" y="190" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#9ca3af" letter-spacing="1">ТРИВАЛІСТЬ — <tspan font-weight="600" fill="#7c3aed">2 години</tspan></text>
  <!-- track -->
  <rect x="308" y="205" width="284" height="4" rx="2" fill="#e5e7eb"/>
  <!-- filled portion (2/8 ≈ 14.3% + half thumb offset) -->
  <rect x="308" y="205" width="50" height="4" rx="2" fill="#7c3aed"/>
  <!-- thumb -->
  <circle cx="358" cy="207" r="9" fill="#7c3aed" filter="url(#ts)"/>
  <defs>
    <filter id="ts"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(124,58,237,0.4)"/></filter>
  </defs>
  <!-- ticks -->
  <text x="308" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">1</text>
  <text x="349" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#7c3aed" font-weight="700" text-anchor="middle">2</text>
  <text x="389" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">3</text>
  <text x="430" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">4</text>
  <text x="470" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">5</text>
  <text x="511" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">6</text>
  <text x="551" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">7</text>
  <text x="592" y="226" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle">8</text>

  <!-- Field 3: radio -->
  <text x="298" y="256" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" font-weight="700" fill="#9ca3af" letter-spacing="1">ЛОКАЦІЯ</text>
  <!-- Studio card – selected -->
  <rect x="298" y="264" width="143" height="50" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="369" y="287" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#7c3aed" text-anchor="middle">Студія</text>
  <text x="369" y="303" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" fill="#9ca3af" text-anchor="middle">включено</text>
  <!-- Outdoor card -->
  <rect x="459" y="264" width="143" height="50" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="530" y="287" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#1f2937" text-anchor="middle">Виїзд</text>
  <text x="530" y="303" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" fill="#9ca3af" text-anchor="middle">+600 грн</text>

  <!-- Divider -->
  <line x1="298" y1="336" x2="602" y2="336" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Result block -->
  <rect x="298" y="350" width="304" height="78" rx="12" fill="#7c3aed"/>
  <text x="314" y="372" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.55)" letter-spacing="1">ДО СПЛАТИ</text>
  <text x="314" y="392" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.65)">Портретна, 2 год, студія</text>
  <text x="590" y="407" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.65)" text-anchor="end">₴</text>
  <text x="598" y="408" font-family="'Segoe UI',Arial,sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="end">1 600</text>

  <!-- Button -->
  <rect x="298" y="444" width="304" height="46" rx="9" fill="#1f2937"/>
  <text x="450" y="472" font-family="'Segoe UI',Arial,sans-serif" font-size="14.5" font-weight="700" fill="#ffffff" text-anchor="middle">Замовити</text>
</svg>
