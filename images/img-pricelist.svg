<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f7ff"/>
  <text x="400" y="50" font-family="Arial" font-size="20" fill="#4c1d95" font-weight="bold" text-anchor="middle">Прайс-лист послуг</text>
  <!-- Card 1 -->
  <rect x="60" y="70" width="200" height="260" rx="14" fill="white" stroke="#e8e0f5" stroke-width="1.5"/>
  <rect x="60" y="70" width="200" height="48" rx="14" fill="#f3f0ff"/>
  <rect x="60" y="100" width="200" height="18" fill="#f3f0ff"/>
  <text x="160" y="100" font-family="Arial" font-size="14" fill="#5b21b6" font-weight="bold" text-anchor="middle">Стартовий</text>
  <text x="160" y="150" font-family="Arial" font-size="26" fill="#7c3aed" font-weight="bold" text-anchor="middle">500 ₴</text>
  <text x="160" y="170" font-family="Arial" font-size="11" fill="#9ca3af" text-anchor="middle">/ одноразово</text>
  <line x1="80" y1="185" x2="240" y2="185" stroke="#f3f0ff" stroke-width="1"/>
  <text x="85" y="205" font-family="Arial" font-size="12" fill="#374151">✓  1 функція</text>
  <text x="85" y="225" font-family="Arial" font-size="12" fill="#374151">✓  Базова підтримка</text>
  <text x="85" y="245" font-family="Arial" font-size="12" fill="#9ca3af">✗  Доопрацювання</text>
  <rect x="80" y="300" width="160" height="16" rx="3" fill="#f3f0ff"/>
  <!-- Card 2 - highlighted -->
  <rect x="295" y="50" width="210" height="290" rx="14" fill="#7c3aed"/>
  <text x="400" y="95" font-family="Arial" font-size="14" fill="white" font-weight="bold" text-anchor="middle">Оптимальний</text>
  <rect x="340" y="103" width="120" height="22" rx="11" fill="#a78bfa"/>
  <text x="400" y="119" font-family="Arial" font-size="11" fill="white" text-anchor="middle">✦ ПОПУЛЯРНИЙ</text>
  <text x="400" y="160" font-family="Arial" font-size="28" fill="white" font-weight="bold" text-anchor="middle">1500 ₴</text>
  <text x="400" y="180" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">/ одноразово</text>
  <line x1="315" y1="196" x2="485" y2="196" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="315" y="218" font-family="Arial" font-size="12" fill="white">✓  До 5 функцій</text>
  <text x="315" y="238" font-family="Arial" font-size="12" fill="white">✓  Пріоритетна підтримка</text>
  <text x="315" y="258" font-family="Arial" font-size="12" fill="white">✓  1 місяць підтримки</text>
  <rect x="315" y="308" width="170" height="17" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Card 3 -->
  <rect x="540" y="70" width="200" height="260" rx="14" fill="white" stroke="#e8e0f5" stroke-width="1.5"/>
  <rect x="540" y="70" width="200" height="48" rx="14" fill="#4c1d95"/>
  <rect x="540" y="100" width="200" height="18" fill="#4c1d95"/>
  <text x="640" y="100" font-family="Arial" font-size="14" fill="white" font-weight="bold" text-anchor="middle">Преміум</text>
  <text x="640" y="150" font-family="Arial" font-size="26" fill="#4c1d95" font-weight="bold" text-anchor="middle">3000 ₴</text>
  <text x="640" y="170" font-family="Arial" font-size="11" fill="#9ca3af" text-anchor="middle">/ одноразово</text>
  <line x1="560" y1="185" x2="720" y2="185" stroke="#f3f0ff" stroke-width="1"/>
  <text x="565" y="205" font-family="Arial" font-size="12" fill="#374151">✓  Без обмежень</text>
  <text x="565" y="225" font-family="Arial" font-size="12" fill="#374151">✓  3 місяці підтримки</text>
  <text x="565" y="245" font-family="Arial" font-size="12" fill="#374151">✓  Доопрацювання</text>
  <rect x="560" y="300" width="160" height="16" rx="3" fill="#4c1d95"/>
</svg>
