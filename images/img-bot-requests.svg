<svg xmlns="http://www.w3.org/2000/svg" width="800" height="560" viewBox="0 0 800 560" fill="none">
  <defs>
    <filter id="card-shadow" x="0" y="0" width="800" height="560" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="rgba(0,0,0,0.30)"/>
    </filter>
    <style>
      .ui { font-family: 'Segoe UI', Arial, sans-serif; }
      .label { font-size: 10px; font-weight: 700; letter-spacing: 1.1px; text-transform: uppercase; fill: #9ca3af; }
      .text { font-size: 14px; fill: #1f2937; }
      .small { font-size: 12px; fill: #6b7280; }
      .title { font-size: 22px; font-weight: 800; fill: #ffffff; }
    </style>
  </defs>

  <rect width="800" height="560" fill="#6d28d9"/>

  <g filter="url(#card-shadow)">
    <rect x="230" y="26" width="340" height="508" rx="20" fill="#ffffff"/>
    <rect x="230" y="26" width="340" height="96" rx="20" fill="#7c3aed"/>
    <rect x="230" y="86" width="340" height="36" fill="#7c3aed"/>
    <text x="400" y="84" text-anchor="middle" class="ui title">Telegram-бот</text>
  </g>

  <g class="ui">
    <rect x="262" y="150" width="276" height="98" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="262" y="150" width="276" height="34" rx="14" fill="#f5f3ff"/>
    <rect x="262" y="170" width="276" height="14" fill="#f5f3ff"/>
    <text x="400" y="171" text-anchor="middle" class="small" fill="#7c3aed" font-weight="700">Бот для прийому заявок</text>

    <rect x="278" y="198" width="180" height="28" rx="10" fill="#f3f4f6"/>
    <text x="292" y="216" class="small">Вітаю! Допоможу прийняти звернення.</text>
    <rect x="326" y="230" width="196" height="28" rx="10" fill="#f5f3ff"/>
    <text x="340" y="248" class="small" fill="#7c3aed">Запис на послугу, ім'я та контакт</text>

    <text x="262" y="288" class="label">Сфера бізнесу</text>
    <rect x="262" y="300" width="276" height="44" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="278" y="327" class="text">Салон краси</text>
    <path d="M512 318 L518 324 L524 318" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="262" y="372" class="label">Тип звернення</text>
    <rect x="262" y="384" width="276" height="44" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="278" y="411" class="text">Запис на послугу</text>
    <path d="M512 402 L518 408 L524 402" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="262" y="456" class="label">Контакт для зв'язку</text>
    <rect x="262" y="468" width="276" height="44" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="278" y="495" class="small">Телефон, email або Telegram</text>
  </g>
</svg>
