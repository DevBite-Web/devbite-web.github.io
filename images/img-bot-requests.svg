<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <filter id="sh" x="-20%" y="-8%" width="140%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="rgba(0,0,0,0.55)"/>
    </filter>
    <linearGradient id="av" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2AABEE"/>
      <stop offset="100%" stop-color="#1a8fc7"/>
    </linearGradient>
    <clipPath id="sc">
      <rect x="282" y="72" width="236" height="370" rx="26"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#6d28d9"/>

  <!-- Phone body -->
  <rect x="270" y="18" width="260" height="464" rx="44" fill="#1c1c1e" filter="url(#sh)"/>
  <rect x="270" y="18" width="260" height="464" rx="44" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>
  <!-- volume buttons -->
  <rect x="261" y="130" width="5" height="38" rx="2.5" fill="#2a2a2c"/>
  <rect x="261" y="182" width="5" height="62" rx="2.5" fill="#2a2a2c"/>
  <!-- power button -->
  <rect x="534" y="160" width="5" height="52" rx="2.5" fill="#2a2a2c"/>

  <!-- Screen -->
  <rect x="282" y="72" width="236" height="370" rx="26" fill="#17212b"/>

  <!-- Notch -->
  <rect x="330" y="72" width="140" height="24" rx="0" fill="#1c1c1e"/>
  <ellipse cx="400" cy="80" rx="38" ry="12" fill="#1c1c1e"/>

  <!-- Status bar  (zone: y=72–94) -->
  <text x="296" y="91" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" font-weight="600" fill="#ffffff">9:41</text>
  <!-- battery -->
  <rect x="492" y="84" width="18" height="10" rx="2" fill="none" stroke="white" stroke-width="1.2"/>
  <rect x="493.2" y="85.2" width="12" height="7.6" rx="1" fill="white"/>
  <rect x="510.5" y="87" width="2.5" height="5.5" rx="1" fill="white"/>

  <!-- TG Header (zone: y=94–146, h=52) -->
  <rect x="282" y="94" width="236" height="52" fill="#17212b"/>
  <line x1="282" y1="146" x2="518" y2="146" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- back arrow -->
  <text x="293" y="126" font-family="Arial,sans-serif" font-size="24" fill="#2AABEE">‹</text>
  <!-- avatar -->
  <circle cx="332" cy="120" r="15" fill="url(#av)"/>
  <!-- bot icon -->
  <rect x="325" y="114" width="14" height="11" rx="2.5" fill="white"/>
  <rect x="327.5" y="111" width="4" height="4" rx="2" fill="white"/>
  <rect x="333.5" y="111" width="4" height="4" rx="2" fill="white"/>
  <!-- name + status -->
  <text x="354" y="116" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600" fill="#ffffff">DevBite Заявки</text>
  <text x="354" y="132" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" fill="#2AABEE">бот</text>

  <!-- Chat area (zone: y=146–360, h=214) -->
  <rect x="282" y="146" width="236" height="214" fill="#17212b"/>

  <!-- Date chip (y=157) -->
  <rect x="362" y="157" width="76" height="16" rx="8" fill="rgba(255,255,255,0.07)"/>
  <text x="400" y="168.5" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#7d8b99" text-anchor="middle">сьогодні</text>

  <!-- Bot bubble (y=182) -->
  <rect x="292" y="182" width="162" height="52" rx="12" fill="#182533"/>
  <polygon points="292,214 282,222 300,222" fill="#182533"/>
  <text x="306" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e4e6eb">Привіт! Як вас звати?</text>
  <text x="306" y="217" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#e4e6eb">Заповнимо заявку разом.</text>
  <text x="450" y="230" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#617d96" text-anchor="end">9:41</text>

  <!-- User bubble (y=254 — big breathing gap) -->
  <rect x="368" y="254" width="138" height="32" rx="12" fill="#2b5278"/>
  <polygon points="506,266 518,273 506,280" fill="#2b5278"/>
  <text x="380" y="275" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#ffffff">Олена Ковальчук</text>
  <text x="504" y="283" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#617d96" text-anchor="end">9:42</text>

  <!-- Typing (y=308) -->
  <rect x="292" y="308" width="52" height="24" rx="12" fill="#182533"/>
  <polygon points="292,322 282,330 300,330" fill="#182533"/>
  <circle cx="305" cy="320" r="4" fill="#617d96" opacity="0.4"/>
  <circle cx="317" cy="320" r="4" fill="#617d96" opacity="0.7"/>
  <circle cx="329" cy="320" r="4" fill="#617d96"/>

  <!-- Keyboard (zone: y=360–404, h=44) -->
  <rect x="282" y="360" width="236" height="44" fill="#1c2733"/>
  <line x1="282" y1="360" x2="518" y2="360" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="290" y="370" width="106" height="24" rx="6" fill="#2b3e50"/>
  <text x="343" y="386" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#e4e6eb" text-anchor="middle">Консультація</text>
  <rect x="404" y="370" width="106" height="24" rx="6" fill="#2b3e50"/>
  <text x="457" y="386" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#e4e6eb" text-anchor="middle">Telegram-бот</text>

  <!-- Input bar (zone: y=404–442, h=38) -->
  <rect x="282" y="404" width="236" height="38" fill="#17212b"/>
  <line x1="282" y1="404" x2="518" y2="404" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <rect x="290" y="412" width="170" height="22" rx="11" fill="#2b3e50"/>
  <text x="302" y="427" font-family="'Segoe UI',Arial,sans-serif" font-size="10.5" fill="#5a6a7a">Повідомлення</text>
  <circle cx="504" cy="423" r="13" fill="#2AABEE"/>
  <polygon points="498,423 504,416 504,430" fill="white"/>
  <rect x="504" y="420" width="4" height="7" fill="white"/>

  <!-- Home bar -->
  <rect x="282" y="434" width="236" height="8" fill="#17212b" clip-path="url(#sc)"/>
  <rect x="355" y="436" width="90" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
</svg>
