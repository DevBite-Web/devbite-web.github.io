<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f7ff"/>
  <!-- Phone frame -->
  <rect x="250" y="20" width="300" height="460" rx="30" fill="white" stroke="#e8e0f5" stroke-width="2"/>
  <!-- Telegram header -->
  <rect x="250" y="20" width="300" height="70" rx="30" fill="#7c3aed"/>
  <rect x="250" y="66" width="300" height="24" fill="#7c3aed"/>
  <circle cx="285" cy="55" r="18" fill="rgba(255,255,255,0.2)"/>
  <text x="285" y="61" font-family="Arial" font-size="16" fill="white" text-anchor="middle">🤖</text>
  <text x="380" y="50" font-family="Arial" font-size="14" fill="white" font-weight="bold">DevBite Bot</text>
  <text x="380" y="68" font-family="Arial" font-size="11" fill="rgba(255,255,255,0.7)">онлайн</text>
  <!-- Messages -->
  <rect x="265" y="105" width="200" height="44" rx="14" fill="#f3f0ff"/>
  <text x="275" y="122" font-family="Arial" font-size="12" fill="#374151">Вітаю! Надішліть</text>
  <text x="275" y="138" font-family="Arial" font-size="12" fill="#374151">вашу заявку 📋</text>
  <rect x="280" y="163" width="220" height="44" rx="14" fill="#7c3aed"/>
  <text x="290" y="180" font-family="Arial" font-size="12" fill="white">Хочу замовити</text>
  <text x="290" y="196" font-family="Arial" font-size="12" fill="white">Telegram-бот</text>
  <rect x="265" y="220" width="230" height="58" rx="14" fill="#f3f0ff"/>
  <text x="275" y="237" font-family="Arial" font-size="12" fill="#374151">Чудово! Вкажіть:</text>
  <text x="275" y="253" font-family="Arial" font-size="12" fill="#374151">📌 Деталі задачі</text>
  <text x="275" y="268" font-family="Arial" font-size="12" fill="#374151">📌 Бюджет</text>
  <!-- Buttons -->
  <rect x="265" y="292" width="135" height="36" rx="8" fill="#7c3aed"/>
  <text x="332" y="315" font-family="Arial" font-size="12" fill="white" text-anchor="middle">📎 Прикріпити</text>
  <rect x="410" y="292" width="130" height="36" rx="8" fill="#f3f0ff" stroke="#d8b4fe"/>
  <text x="475" y="315" font-family="Arial" font-size="12" fill="#7c3aed" text-anchor="middle">💬 Написати</text>
  <!-- Input bar -->
  <rect x="260" y="430" width="220" height="36" rx="18" fill="#f3f4f6" stroke="#e5e7eb"/>
  <text x="275" y="453" font-family="Arial" font-size="12" fill="#9ca3af">Повідомлення...</text>
  <circle cx="498" cy="448" r="16" fill="#7c3aed"/>
  <text x="498" y="454" font-family="Arial" font-size="14" fill="white" text-anchor="middle">➤</text>
</svg>
